name: Sync catalog workflow to n8n

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Ruins_Untold/catalog/n8n-workflow.json'

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push workflow to n8n
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_WORKFLOW_ID: ${{ secrets.N8N_WORKFLOW_ID }}
        run: |
          echo "Building payload..."
          PAYLOAD=$(python3 -c "import json,os; w=json.load(open('Ruins_Untold/catalog/n8n-workflow.json')); [w.pop(k, None) for k in ['id','active','versionId','meta','tags','pinData']]; w.get('settings',{}).pop('binaryMode',None); print(json.dumps(w))")

          echo "Sending to n8n (workflow ID: ${N8N_WORKFLOW_ID})..."
          HTTP_CODE=$(curl -s -o /tmp/n8n_response.json -w "%{http_code}" -X PUT \
            "http://localhost:5678/api/v1/workflows/${N8N_WORKFLOW_ID}" \
            -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/n8n_response.json

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Workflow synced to n8n"
          else
            echo "Sync failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
